<nav class="navbar">
  <div class="navbar-container">
    <div class="navbar-logo" routerLink="/">🌸 Global Yofi</div>

    <!-- 🔎 BARRA DE BÚSQUEDA GLOBAL -->
    <div class="navbar-search">
      <input type="text" [(ngModel)]="searchQuery" (keyup.enter)="onSearch()" placeholder="Buscar productos..." />
      <button (click)="onSearch()">🔍</button>
    </div>

    <ul class="navbar-links">
      <li><a (click)="scrollToSection('about')" class="nav-link">Nosotros</a></li>
      <li><a (click)="scrollToSection('values')" class="nav-link">Valores</a></li>
      <li><a routerLink="/productos" class="nav-link">Productos</a></li>
    </ul>

    <div class="navbar-actions">
      <!-- 🛒 CARRITO (Solo fuera del dropdown cuando NO ha iniciado sesión) -->
      <button class="btn-cart" routerLink="/carrito" *ngIf="!isLoggedIn">
        🛒 <span *ngIf="carritoService.getTotalItems() > 0" class="cart-badge">{{ carritoService.getTotalItems() }}</span>
      </button>

      <div class="navbar-auth" *ngIf="isLoggedIn; else loginButtons">
        <div class="user-dropdown">
          <button class="btn-user" (click)="showUserMenu = !showUserMenu">
            <span class="material-icons">account_circle</span>
            <span class="user-email-text">{{ userEmail }}</span>
            <span class="material-icons dropdown-arrow">expand_more</span>
          </button>
          
          <div class="dropdown-menu" [class.show]="showUserMenu">
            <!-- 🛒 Carrito dentro del menú -->
            <a routerLink="/carrito" class="dropdown-item" (click)="showUserMenu = false">
              <div class="cart-icon-wrapper">
                <span class="material-icons">shopping_cart</span>
                <span *ngIf="carritoService.getTotalItems() > 0" class="cart-dot"></span>
              </div>
              Mi Carrito ({{ carritoService.getTotalItems() }})
            </a>
            
            <a routerLink="/mis-pedidos" class="dropdown-item" (click)="showUserMenu = false">
              <span class="material-icons">inventory_2</span>
              Mis Pedidos
            </a>
            
            <div class="dropdown-divider"></div>
            
            <button class="dropdown-item logout" (click)="logout(); showUserMenu = false">
              <span class="material-icons">logout</span>
              Cerrar sesión
            </button>
          </div>
        </div>
      </div>

      <ng-template #loginButtons>
        <button class="btn btn-primary" routerLink="/login">Inicia sesión</button>
        <button class="btn btn-primary" routerLink="/registro" style="margin-left: 8px;">Registro</button>
      </ng-template>
    </div>
  </div>
</nav>
