<section class="register-container">
  <div class="register-card">
    <h1>🌸 Crea tu cuenta en <span>Global Yofi</span></h1>
    <p class="subtitle">Descubre tu mejor versión con nosotros 💄</p>

    <form class="register-form" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input 
            id="nombre" 
            [(ngModel)]="nombre" 
            name="nombre" 
            required 
            maxlength="50"
            (keypress)="soloLetras($event)"
            (input)="sanitizarLetras('nombre')"
            placeholder="Ej: María"
          />
        </div>

        <div class="form-group">
          <label for="apellido">Apellido</label>
          <input 
            id="apellido" 
            [(ngModel)]="apellido" 
            name="apellido" 
            required 
            maxlength="50"
            (keypress)="soloLetras($event)"
            (input)="sanitizarLetras('apellido')"
            placeholder="Ej: Pérez"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          placeholder="ejemplo@yofi.com"
          required
          maxlength="100"
        />
        <small class="hint-text" *ngIf="email && !esEmailValido(email)">⚠️ Correo inválido</small>
      </div>

      <div class="form-group">
        <label for="telefono">Teléfono</label>
        <input
          type="text"
          id="telefono"
          [(ngModel)]="telefono"
          name="telefono"
          placeholder="+57 300 000 0000"
          required
          maxlength="15"
          (keypress)="soloNumeros($event)"
          (input)="sanitizarNumeros()"
        />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="contrasena">Contraseña</label>
          <input
            type="password"
            id="contrasena"
            [(ngModel)]="contrasena"
            name="contrasena"
            placeholder="••••••••"
            required
            maxlength="30"
          />
          <small class="hint-text" *ngIf="contrasena && !esContrasenaSegura(contrasena)">
            ⚠️ Debe ser segura (8+ caracteres, A, a, 1, *)
          </small>
        </div>

        <div class="form-group">
          <label for="repetirContrasena">Confirmar Contraseña</label>
          <input
            type="password"
            id="repetirContrasena"
            [(ngModel)]="repetirContrasena"
            name="repetirContrasena"
            placeholder="••••••••"
            required
            maxlength="30"
          />
          <small class="hint-text" *ngIf="repetirContrasena && contrasena !== repetirContrasena">
            ⚠️ No coinciden
          </small>
        </div>
      </div>

      <button type="submit" class="btn-register" [disabled]="cargando">
        {{ cargando ? 'Registrando...' : 'Crear cuenta' }}
      </button>

      <div class="mensaje-container">
        <p *ngIf="mensaje" [class.msg-error]="mensaje.includes('⚠️') || mensaje.includes('❌')" [class.msg-success]="mensaje.includes('✅')">
          {{ mensaje }}
        </p>
      </div>
    </form>

    <p class="login-text">
      ¿Ya tienes cuenta?
      <a routerLink="/login" class="login-link">Inicia sesión aquí</a>
    </p>
    <button class="btn-volver" routerLink="/" type="button">Volver al inicio</button>
  </div>
</section>
