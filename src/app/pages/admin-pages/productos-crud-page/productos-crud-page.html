<section class="productos-crud-container">
  <h1 class="titulo">🛍️ Gestión de Productos</h1>

  <!-- Mensaje -->
  <div *ngIf="mensaje" class="mensaje">
    {{ mensaje }}
  </div>

  <!-- Acciones principales -->
  <div class="acciones-inventario">
    <button class="btn-inventario btn-agregar" (click)="irAAgregarProducto()">
      ➕ Agregar Producto
    </button>
    <button class="btn-inventario btn-retirar" (click)="irARetirarStock()">
      ➖ Retirar del Inventario
    </button>
  </div>

  <hr />

  <!-- Tabla de productos -->
  <div *ngIf="!cargando; else cargandoTpl">
    <table class="tabla">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Descripción</th>
          <th>Marca</th>
          <th>Precio</th>
          <th>Categoría</th>
          <th>Proveedor</th>
          <!-- <th>Stock (Actual / Mínimo)</th> -->
          <!-- <th>Estado</th> -->
          <th>Imagen</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let p of productos">
          <td>{{ p.id }}</td>
          <td>{{ p.nombre }}</td>
          <td>{{ p.descripcion }}</td>
          <td>{{ p.marca }}</td>
          <td>${{ p.precio | number: '1.0-2' }}</td>
          <td>{{ p.categoria }}</td>
          <td>{{ p.proveedor }}</td>

          <!-- Stock -->
          <!-- <td>
            {{ p.stockActual || 0 }}
            <span class="min-stock">/ min: {{ p.stockMinimo || 0 }}</span>
          </td> -->

          <!-- Estado -->
          <!-- <td>
            <span
              [ngClass]="p.estado === 'activo' ? 'estado-activo' : 'estado-inactivo'"
            >
              {{ p.estado | titlecase }}
            </span>
          </td> -->

          <!-- Imagen -->
          <td>
            <img
              [src]="productosService.getImagenUrl(p.imagenUrl)"
              alt="Imagen del producto"
              width="70"
              height="70"
              style="object-fit: cover; border-radius: 8px; box-shadow: 0 0 4px rgba(0, 0, 0, 0.2);"
            />
          </td>

          <!-- Acciones -->
          <td>
            <button class="btn-editar" (click)="editar(p.id)" style="background: none; border: none; font-size: 1.2rem; cursor: pointer; margin-right: 10px;">✏️</button>
            <button class="btn-eliminar" (click)="eliminar(p.id)">🗑️</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Estado de carga -->
  <ng-template #cargandoTpl>
    <p class="cargando">⏳ Cargando productos...</p>
  </ng-template>
</section>
