<section class="reportes-container">
  <h1 class="titulo">Reportes de Productos</h1>
  <p class="descripcion">
    Visualiza estadísticas de los productos por categoría, stock y precios.
  </p>

  <div class="graficos-grid">
    <!--Productos por Categoría -->
    <div class="grafico-card">
      <h3>Productos por Categoría</h3>
      <canvas #categoriaChart></canvas>
    </div>

    <!-- Stock por Proveedor -->
    <div class="grafico-card">
      <h3>Stock por Proveedor</h3>
      <canvas #proveedorChart></canvas>
    </div>

    <!-- Productos más Caros -->
    <div class="grafico-card full-width">
      <h3>Top Productos Más Caros</h3>
      <canvas #precioChart></canvas>
    </div>
  </div>
</section>
